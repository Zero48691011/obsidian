# ============================================================
# Docker Compose — Deploy Recorder + PostgreSQL
# 快速启动命令: docker compose up -d
# ============================================================

version: "3.9"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: deploy-recorder-db
    restart: always
    environment:
      POSTGRES_DB: deploy_recorder
      POSTGRES_USER: recorder
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recorder -d deploy_recorder"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Deploy Recorder API 服务
  deploy-recorder:
    build:
      context: .
      dockerfile: Dockerfile.recorder
    container_name: deploy-recorder-api
    restart: always
    environment:
      DATABASE_URL: postgresql://recorder:${DB_PASSWORD:-change-me-in-production}@postgres:5432/deploy_recorder
      API_KEY: ${RECO...Y:-change-me-in-production}
      LOG_LEVEL: INFO
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
    driver: local